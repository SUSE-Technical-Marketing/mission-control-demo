apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-sattrack-ui
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: ui
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/ui-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: {{ .Release.Name }}-ui
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: ui
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: ui
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: {{ .Values.ui.memoryRequest }}, cpu: 10m }
            limits:   { memory: {{ .Values.ui.memoryLimit }},   cpu: 50m }
      volumes:
        - name: ui
          configMap: { name: "{{ .Release.Name }}-ui-code" }
