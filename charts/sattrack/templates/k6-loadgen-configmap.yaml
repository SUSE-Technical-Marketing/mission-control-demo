apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-k6-script
  labels:
    app: k6-loadgen
    release: {{ .Release.Name }}
data:
  script.js: |
    import http from 'k6/http';
    import { sleep, check } from 'k6';

    // Constant arrival rate — fires requests at a fixed RPS regardless of
    // response time. This keeps topology edges warm in SUSE Observability
    // without overwhelming the services.
    export const options = {
      scenarios: {
        dashboard_traffic: {
          executor:        'constant-arrival-rate',
          rate:            __ENV.RPS || 2,       // requests per second
          timeUnit:        '1s',
          duration:        '9999h',              // run indefinitely
          preAllocatedVUs: 5,
          maxVUs:          10,
        },
      },
      // No thresholds — this is a traffic generator, not a test
      thresholds: {},
    };

    const BASE_URL = __ENV.TARGET_URL || 'http://localhost:3005';

    export default function () {
      const res = http.get(`${BASE_URL}/dashboard`, {
        tags: { endpoint: 'dashboard' },
      });

      check(res, {
        'status 200 or 207': (r) => r.status === 200 || r.status === 207,
      });
    }
---
