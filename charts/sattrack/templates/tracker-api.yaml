apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-tracker-api
  labels:
    {{- include "sattrack.labels" (dict "app" "tracker-api" "root" .) | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sattrack.selectorLabels" (dict "app" "tracker-api" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sattrack.selectorLabels" (dict "app" "tracker-api" "root" .) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/tracker-api-configmap.yaml") . | sha256sum }}
    spec:
      {{- if .Values.otel.enabled }}
      initContainers:
        {{- include "sattrack.otelInitContainer" . | nindent 8 }}
      {{- end }}
      containers:
        - name: tracker-api
          image: node:20-alpine
          command:
            {{- include "sattrack.nodeCommand" . | nindent 12 }}
          ports:
            - containerPort: {{ .Values.trackerApi.port }}
          env:
            - name: PORT
              value: {{ .Values.trackerApi.port | quote }}
            - name: ORBIT_ENGINE_URL
              value: "http://{{ .Release.Name }}-orbit-engine:{{ .Values.orbitEngine.port }}"
            - name: PASS_PLANNER_URL
              value: "http://{{ .Release.Name }}-pass-planner:{{ .Values.passPlanner.port }}"
            - name: TELEMETRY_STORE_URL
              value: "http://{{ .Release.Name }}-telemetry-store:{{ .Values.telemetryStore.port }}"
            - name: SAT_RECEIVER_URL
              value: "http://{{ .Release.Name }}-sat-receiver:{{ .Values.satReceiver.port }}"
            - name: UPSTREAM_TIMEOUT_MS
              value: {{ .Values.trackerApi.upstreamTimeoutMs | quote }}
            {{- include "sattrack.otelEnv" (dict "service" "tracker-api" "root" .) | nindent 12 }}
          volumeMounts:
            - name: code
              mountPath: /app/server.js
              subPath: server.js
            {{- include "sattrack.otelVolumeMounts" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.trackerApi.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: {{ .Values.trackerApi.memoryRequest }}
              cpu: 20m
            limits:
              memory: {{ .Values.trackerApi.memoryLimit }}
              cpu: 100m
      volumes:
        - name: code
          configMap:
            name: {{ .Release.Name }}-tracker-api-code
        {{- include "sattrack.otelVolumes" . | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-tracker-api
  labels:
    {{- include "sattrack.labels" (dict "app" "tracker-api" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "sattrack.selectorLabels" (dict "app" "tracker-api" "root" .) | nindent 4 }}
  ports:
    - port: {{ .Values.trackerApi.port }}
      targetPort: {{ .Values.trackerApi.port }}
      name: http
