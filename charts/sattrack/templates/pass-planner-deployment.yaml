apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-pass-planner
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: pass-planner
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: pass-planner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: pass-planner
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/pass-planner-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: pass-planner
          image: node:20-alpine
          command: ["node", "/app/server.js"]
          ports:
            - containerPort: {{ .Values.passPlanner.port }}
          env:
            - name: PORT
              value: {{ .Values.passPlanner.port | quote }}
            - name: ORBIT_ENGINE_URL
              value: "http://{{ .Release.Name }}-orbit-engine:{{ .Values.orbitEngine.port }}"
            - name: UPSTREAM_TIMEOUT_MS
              value: {{ .Values.passPlanner.upstreamTimeoutMs | quote }}
          volumeMounts:
            - name: code
              mountPath: /app/server.js
              subPath: server.js
          readinessProbe:
            httpGet: { path: /healthz, port: {{ .Values.passPlanner.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: {{ .Values.passPlanner.memoryRequest }}, cpu: 20m }
            limits:   { memory: {{ .Values.passPlanner.memoryLimit }},   cpu: 100m }
      volumes:
        - name: code
          configMap: { name: "{{ .Release.Name }}-pass-planner-code" }