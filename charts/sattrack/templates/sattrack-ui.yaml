apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-sattrack-ui
  labels:
    {{- include "sattrack.labels" (dict "app" "sattrack-ui" "root" .) | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sattrack.selectorLabels" (dict "app" "sattrack-ui" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sattrack.selectorLabels" (dict "app" "sattrack-ui" "root" .) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/sattrack-ui-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: sattrack-ui
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: ui
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: ui
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: {{ .Values.sattrackUi.memoryRequest }}
              cpu: 10m
            limits:
              memory: {{ .Values.sattrackUi.memoryLimit }}
              cpu: 50m
      volumes:
        - name: ui
          configMap:
            name: {{ .Release.Name }}-sattrack-ui-code
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-sattrack-ui
  labels:
    {{- include "sattrack.labels" (dict "app" "sattrack-ui" "root" .) | nindent 4 }}
spec:
  type: {{ if .Values.sattrackUi.exposeLoadBalancer }}LoadBalancer{{ else }}ClusterIP{{ end }}
  selector:
    {{- include "sattrack.selectorLabels" (dict "app" "sattrack-ui" "root" .) | nindent 4 }}
  ports:
    - port: 80
      targetPort: 80
      name: http
