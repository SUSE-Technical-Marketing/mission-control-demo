apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-tracker-api
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: tracker-api
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: tracker-api
  ports:
    - port: {{ .Values.trackerApi.port }}
      targetPort: {{ .Values.trackerApi.port }}
      name: http
