apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-sat-receiver
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: sat-receiver
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: sat-receiver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: sat-receiver
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/sat-receiver-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: sat-receiver
          image: node:20-alpine
          command: ["node", "/app/server.js"]
          ports:
            - containerPort: {{ .Values.satReceiver.port }}
          env:
            - name: PORT
              value: {{ .Values.satReceiver.port | quote }}
            - name: PASS_PLANNER_URL
              value: "http://{{ .Release.Name }}-pass-planner:{{ .Values.passPlanner.port }}"
            - name: TELEMETRY_STORE_URL
              value: "http://{{ .Release.Name }}-telemetry-store:{{ .Values.telemetryStore.port }}"
            - name: FRAME_INTERVAL_MS
              value: {{ .Values.satReceiver.frameIntervalMs | quote }}
            - name: UPSTREAM_TIMEOUT_MS
              value: {{ .Values.satReceiver.upstreamTimeoutMs | quote }}
          volumeMounts:
            - name: code
              mountPath: /app/server.js
              subPath: server.js
          readinessProbe:
            httpGet: { path: /healthz, port: {{ .Values.satReceiver.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: {{ .Values.satReceiver.memoryRequest }}, cpu: 20m }
            limits:   { memory: {{ .Values.satReceiver.memoryLimit }},   cpu: 100m }
      volumes:
        - name: code
          configMap: { name: "{{ .Release.Name }}-sat-receiver-code" }
