apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-telemetry-store-code
  labels:
    {{- include "sattrack.labels" (dict "app" "telemetry-store" "root" .) | nindent 4 }}
data:
  server.js: |
    /**
     * telemetry-store
     *
     * Stores telemetry frames pushed by sat-receiver and serves
     * aggregated signal quality data to tracker-api.
     *
     * ── Exercise 1: Memory leak (CACHE_ENABLED) ───────────────────────────────────
     * CACHE_ENABLED=true activates frame replay caching on the write path.
     * The cache was introduced in v2.3 to speed up historical frame replay
     * by retaining parsed frame representations after ingest. It has not yet
     * had an eviction policy implemented.
     *
     * sat-receiver posts one frame every 5s. At 2MB per cached entry and a
     * 256Mi container limit (node:20-alpine baseline ~130MB RSS, ~126MB headroom):
     *   1 frame/5s × 2MB = ~0.4MB/sec → OOMKill in ~5 minutes
     *
     * Fix: set CACHE_ENABLED=false
     *
     * ── Exercise 2: Latency (FRAME_VALIDATION_ENABLED) ───────────────────────────
     * FRAME_VALIDATION_ENABLED=true activates deep frame validation on the write
     * path. Introduced in v2.5 to catch anomalous telemetry before it pollutes
     * the quality baseline. The validation routine performs a CPU-bound multi-pass
     * analysis against rolling signal history and has not been profiled under load.
     *
     * At 3500ms cost with a 5s frame interval, the event loop is blocked 70%
     * of the time. /quality reads issued by tracker-api during a validation pass
     * queue behind the running validation and wait up to 3500ms for a response.
     * Expected: p90 ~3s, p99 ~3.5s — reliably above typical alert thresholds.
     * The pod stays healthy with flat memory and no errors in the logs.
     *
     * Fix: set FRAME_VALIDATION_ENABLED=false
     */
    'use strict';

    const http = require('http');

    const CACHE_ENABLED            = process.env.CACHE_ENABLED             === 'true';
    const FRAME_VALIDATION_ENABLED = process.env.FRAME_VALIDATION_ENABLED  === 'true';
    const VALIDATION_COST_MS       = parseInt(process.env.VALIDATION_COST_MS || '3500');
    const CACHE_CHUNK              = 2 * 1024 * 1024; // 2 MB per cache entry

    // ── Structured logger ─────────────────────────────────────────────────────────
    function log(level, msg, fields = {}) {
      console.log(JSON.stringify({ ts: new Date().toISOString(), level, svc: 'telemetry-store', msg, ...fields }));
    }

    // ── Exercise 1: frame replay cache (no eviction) ──────────────────────────────
    const queryCache = [];
    const CACHE_WARN_INTERVAL = 10;

    function pushCache() {
      const buf = Buffer.allocUnsafe(CACHE_CHUNK);
      buf.fill(0xAB); // non-zero pattern — defeats OS zero-page deduplication
      queryCache.push(buf);
      const { heapUsed, rss } = process.memoryUsage();
      if (queryCache.length % CACHE_WARN_INTERVAL === 0) {
        log('warn', 'frame cache growing — no eviction policy', {
          cacheEntries: queryCache.length,
          cacheMb:      Math.round((queryCache.length * CACHE_CHUNK) / 1024 / 1024),
          heapMb:       Math.round(heapUsed / 1024 / 1024),
          rssMb:        Math.round(rss      / 1024 / 1024),
          hint:         'set CACHE_ENABLED=false to disable',
        });
      }
    }

    // ── Exercise 2: deep frame validation (CPU-bound, blocks event loop) ──────────
    // Simulates a multi-pass signal anomaly check against rolling history.
    // The busy-wait is intentional — it blocks the event loop the same way
    // a real CPU-bound computation would, making it visible in latency metrics
    // and traces rather than just in CPU usage graphs.
    function validateFrame(frame) {
      const deadline = Date.now() + VALIDATION_COST_MS;

      // Pass 1 — SNR baseline cross-check (simulated)
      let acc = 0;
      while (Date.now() < deadline * 0.4) {
        acc += Math.sin(acc + frame.snrDb) * Math.cos(acc);
      }

      // Pass 2 — attitude anomaly detection (simulated)
      while (Date.now() < deadline * 0.7) {
        acc += Math.sqrt(Math.abs(acc + frame.attitude?.roll ?? 0));
      }

      // Pass 3 — historical baseline comparison (simulated)
      while (Date.now() < deadline) {
        acc += Math.log1p(Math.abs(acc));
      }

      // Result is discarded — validation only raises an exception on anomaly
      // (no anomalies in the simulation, so it always passes)
      return { valid: true, passesRun: 3, durationMs: VALIDATION_COST_MS };
    }

    // ── Frame store (bounded — healthy) ──────────────────────────────────────────
    const frameStore = {};
    const MAX_FRAMES = 500;
    let totalFramesReceived = 0;

    function storeFrame(frame) {
      const sat = frame.satellite;
      if (!frameStore[sat]) frameStore[sat] = [];
      frameStore[sat].unshift(frame);
      if (frameStore[sat].length > MAX_FRAMES) frameStore[sat].pop();
      totalFramesReceived++;
    }

    function getQuality(satellite) {
      const frames = frameStore[satellite] || [];
      if (frames.length === 0) return null;
      const recent  = frames.slice(0, 50);
      const avgSnr  = recent.reduce((s, f) => s + f.snrDb,       0) / recent.length;
      const avgSig  = recent.reduce((s, f) => s + f.signalDbm,   0) / recent.length;
      const errRate = recent.reduce((s, f) => s + f.frameErrors, 0) / recent.length;
      return {
        satellite,
        avgSnrDb:       parseFloat(avgSnr.toFixed(2)),
        avgSignalDbm:   parseFloat(avgSig.toFixed(2)),
        frameErrorRate: parseFloat((errRate / 100).toFixed(4)),
        totalFrames:    frames.length,
        lastFrame:      frames[0]?.timestamp || null,
        quality:        avgSnr > 15 ? 'good' : avgSnr > 10 ? 'marginal' : 'poor',
      };
    }

    // ── HTTP server ───────────────────────────────────────────────────────────────
    const server = http.createServer((req, res) => {
      const t0 = Date.now();
      res.setHeader('Content-Type', 'application/json');
      res.setHeader('Access-Control-Allow-Origin', '*');

      const reply = (status, body) => {
        res.writeHead(status);
        res.end(JSON.stringify(body));
      };

      if (req.url === '/healthz') {
        const { heapUsed, rss } = process.memoryUsage();
        return reply(200, {
          ok:                     true,
          service:                'telemetry-store',
          cacheEnabled:           CACHE_ENABLED,
          frameValidationEnabled: FRAME_VALIDATION_ENABLED,
          cacheEntries:           queryCache.length,
          heapMb:                 Math.round(heapUsed / 1024 / 1024),
          rssMb:                  Math.round(rss      / 1024 / 1024),
        });
      }

      // POST /frames
      if (req.method === 'POST' && req.url === '/frames') {
        let body = '';
        req.on('data', c => body += c);
        req.on('end', () => {
          try {
            const frame = JSON.parse(body);
            storeFrame(frame);

            // Exercise 1: cache leak
            if (CACHE_ENABLED) {
              pushCache();
            }

            // Exercise 2: deep validation — CPU-bound, blocks event loop
            let validationResult = null;
            if (FRAME_VALIDATION_ENABLED) {
              validationResult = validateFrame(frame);
              if (validationResult.durationMs > 200) {
                log('warn', 'frame validation slow', {
                  satellite:    frame.satellite,
                  seq:          frame.seqNumber,
                  durationMs:   validationResult.durationMs,
                  hint:         'set FRAME_VALIDATION_ENABLED=false to disable',
                });
              }
            }

            log('debug', 'frame stored', {
              satellite:    frame.satellite,
              seq:          frame.seqNumber,
              snrDb:        frame.snrDb,
              cacheEntries: queryCache.length,
              validationMs: validationResult?.durationMs ?? null,
              ms:           Date.now() - t0,
            });

            return reply(201, { ok: true, stored: frame.frameId });
          } catch (e) {
            log('error', 'invalid frame payload', { error: e.message });
            return reply(400, { error: 'Invalid frame JSON' });
          }
        });
        return;
      }

      // GET /quality
      if (req.url === '/quality') {
        const satellites = Object.keys(frameStore);
        const quality    = satellites.map(getQuality).filter(Boolean);
        const { heapUsed, rss } = process.memoryUsage();

        log('info', 'quality read', {
          satellites:   satellites.length,
          totalFrames:  totalFramesReceived,
          cacheEntries: queryCache.length,
          heapMb:       Math.round(heapUsed / 1024 / 1024),
          rssMb:        Math.round(rss      / 1024 / 1024),
          ms:           Date.now() - t0,
        });

        return reply(200, {
          quality,
          totalSatellites:        satellites.length,
          cacheEnabled:           CACHE_ENABLED,
          frameValidationEnabled: FRAME_VALIDATION_ENABLED,
          timestamp:              new Date().toISOString(),
        });
      }

      // GET /frames/:satellite
      if (req.url.startsWith('/frames/')) {
        const satellite = decodeURIComponent(req.url.replace('/frames/', ''));
        const frames    = (frameStore[satellite] || []).slice(0, 20);
        return reply(200, { satellite, frames, count: frames.length });
      }

      return reply(404, { error: 'Not found' });
    });

    const PORT = process.env.PORT || 3003;
    server.listen(PORT, () => {
      log('info', 'listening', {
        port:                   PORT,
        cacheEnabled:           CACHE_ENABLED,
        frameValidationEnabled: FRAME_VALIDATION_ENABLED,
        validationCostMs:       FRAME_VALIDATION_ENABLED ? VALIDATION_COST_MS : null,
      });
      if (CACHE_ENABLED) {
        log('warn', 'frame replay cache ENABLED — no eviction policy — memory will grow under ingest');
      }
      if (FRAME_VALIDATION_ENABLED) {
        log('warn', 'deep frame validation ENABLED — CPU-bound ~' + VALIDATION_COST_MS + 'ms per frame — event loop will be blocked during ingest');
      }
    });
