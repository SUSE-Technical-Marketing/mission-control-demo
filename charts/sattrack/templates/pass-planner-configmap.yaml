apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-pass-planner-code
  labels:
    {{- include "sattrack.labels" (dict "app" "pass-planner" "root" .) | nindent 4 }}
data:
  server.js: |
    /**
     * pass-planner
     *
     * Maintains the DS-7 contact schedule. Fetches upcoming passes from
     * orbit-engine and enriches them with station scheduling metadata.
     */
    'use strict';

    const http = require('http');

    const ORBIT_ENGINE_URL = process.env.ORBIT_ENGINE_URL || 'http://localhost:3001';
    const TIMEOUT_MS       = parseInt(process.env.UPSTREAM_TIMEOUT_MS || '4000');

    // ── Structured logger ─────────────────────────────────────────────────────────
    function log(level, msg, fields = {}) {
      console.log(JSON.stringify({ ts: new Date().toISOString(), level, svc: 'pass-planner', msg, ...fields }));
    }

    // ── Upstream fetch ────────────────────────────────────────────────────────────
    function fetchJson(url) {
      return new Promise((resolve, reject) => {
        const t0    = Date.now();
        const timer = setTimeout(() => reject(new Error(`timeout after ${TIMEOUT_MS}ms: ${url}`)), TIMEOUT_MS);
        const req   = http.get(url, (res) => {
          clearTimeout(timer);
          let body = '';
          res.on('data', c => body += c);
          res.on('end', () => {
            const ms = Date.now() - t0;
            try {
              const data = JSON.parse(body);
              log('debug', 'upstream ok', { url, status: res.statusCode, ms });
              resolve(data);
            } catch (e) {
              log('error', 'upstream invalid JSON', { url, ms });
              reject(new Error('invalid JSON'));
            }
          });
        });
        req.on('error', e => {
          clearTimeout(timer);
          log('error', 'upstream connection failed', { url, error: e.message });
          reject(e);
        });
      });
    }

    function enrichPass(pass, idx) {
      const operators  = ['VAN DER BERG', 'KOWALSKI', 'OSEI', 'LINDQVIST'];
      const priorities = ['routine', 'routine', 'high', 'routine', 'critical'];
      return {
        ...pass,
        stationId:        'DS-7',
        operator:         operators[idx % operators.length],
        priority:         priorities[idx % priorities.length],
        scheduledAt:      new Date(Date.now() - 5 * 60 * 1000).toISOString(),
        antennaMode:      'auto-track',
        recordingEnabled: true,
      };
    }

    // ── HTTP server ───────────────────────────────────────────────────────────────
    const server = http.createServer(async (req, res) => {
      const t0 = Date.now();
      res.setHeader('Content-Type', 'application/json');
      res.setHeader('Access-Control-Allow-Origin', '*');

      const reply = (status, body) => {
        res.writeHead(status);
        res.end(JSON.stringify(body));
        if (req.url !== '/healthz') {
          log(status >= 500 ? 'error' : 'info', 'request', { method: req.method, path: req.url, status, ms: Date.now() - t0 });
        }
      };

      if (req.url === '/healthz') return reply(200, { ok: true, service: 'pass-planner' });

      if (req.url === '/schedule') {
        try {
          const data     = await fetchJson(`${ORBIT_ENGINE_URL}/passes`);
          const schedule = (data.passes || []).map(enrichPass);
          log('info', 'schedule built', { passes: schedule.length });
          return reply(200, { schedule, station: data.station, updatedAt: new Date().toISOString(), count: schedule.length });
        } catch (err) {
          log('error', 'schedule unavailable — orbit-engine unreachable', { error: err.message });
          return reply(502, { error: `orbit-engine unavailable: ${err.message}` });
        }
      }

      if (req.url === '/active') {
        try {
          const data   = await fetchJson(`${ORBIT_ENGINE_URL}/passes`);
          const active = (data.passes || []).find(p => p.status === 'active') || null;
          if (active) {
            log('info', 'active pass', { satellite: active.satellite, maxElevation: active.maxElevation });
          } else {
            log('debug', 'no active pass');
          }
          return reply(200, { active: active ? enrichPass(active, 0) : null, hasActive: !!active });
        } catch (err) {
          log('error', 'active pass check failed — orbit-engine unreachable', { error: err.message });
          return reply(502, { error: `orbit-engine unavailable: ${err.message}`, active: null, hasActive: false });
        }
      }

      return reply(404, { error: 'Not found' });
    });

    const PORT = process.env.PORT || 3002;
    server.listen(PORT, () => log('info', 'listening', { port: PORT, orbitEngineUrl: ORBIT_ENGINE_URL }));
