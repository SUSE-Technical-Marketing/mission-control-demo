apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-orbit-engine
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: orbit-engine
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: orbit-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: orbit-engine
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/orbit-engine-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: orbit-engine
          image: node:20-alpine
          command: ["node", "/app/server.js"]
          ports:
            - containerPort: {{ .Values.orbitEngine.port }}
          env:
            - name: PASS_CYCLE_SECS
              value: {{ .Values.orbitEngine.passCycleSecs | quote }}
            - name: PORT
              value: {{ .Values.orbitEngine.port | quote }}
          volumeMounts:
            - name: code
              mountPath: /app/server.js
              subPath: server.js
          readinessProbe:
            httpGet: { path: /healthz, port: {{ .Values.orbitEngine.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: {{ .Values.orbitEngine.memoryRequest }}, cpu: 20m }
            limits:   { memory: {{ .Values.orbitEngine.memoryLimit }},   cpu: 100m }
      volumes:
        - name: code
          configMap: { name: "{{ .Release.Name }}-orbit-engine-code" }
