apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-k6-script
  labels:
    {{ include "sattrack.labels" (dict "app" "k6-loadgen" "root" .) | nindent 4 }}
data:
  script.js: |
    import http from 'k6/http';
    import { sleep, check, group } from 'k6';

    // Constant arrival rate across all endpoints — keeps every edge in the
    // SUSE Observability topology warm and produces per-endpoint error rates.
    // The /telemetry endpoint returns 500 when telemetry-store is OOMKilled,
    // giving a clean error rate signal independent of the composite /dashboard.
    export const options = {
      scenarios: {
        // Main dashboard — same path as a browser
        dashboard: {
          executor:        'constant-arrival-rate',
          rate:            __ENV.RPS || 2,
          timeUnit:        '1s',
          duration:        '9999h',
          preAllocatedVUs: 3,
          maxVUs:          10,
          exec:            'dashboard',
        },
        // Individual data endpoints — one call per 5s each, staggered
        individual: {
          executor:        'constant-arrival-rate',
          rate:            1,
          timeUnit:        '5s',
          duration:        '9999h',
          preAllocatedVUs: 2,
          maxVUs:          5,
          exec:            'individual',
        },
        // Health checks — one call per 10s each
        health: {
          executor:        'constant-arrival-rate',
          rate:            1,
          timeUnit:        '10s',
          duration:        '9999h',
          preAllocatedVUs: 2,
          maxVUs:          4,
          exec:            'health',
        },
      },
      thresholds: {},
    };

    const BASE = __ENV.TARGET_URL || 'http://localhost:80';

    export function dashboard() {
      const res = http.get(`${BASE}/api/dashboard`, { tags: { endpoint: 'dashboard' } });
      check(res, { 'dashboard 2xx': (r) => r.status === 200 || r.status === 207 });
    }

    export function individual() {
      const endpoints = ['/api/positions', '/api/schedule', '/api/telemetry', '/api/receiver'];
      const path = endpoints[Math.floor(Math.random() * endpoints.length)];
      const res  = http.get(`${BASE}${path}`, { tags: { endpoint: path.replace('/api/', '') } });
      check(res, { '2xx or 500': (r) => r.status < 600 });
    }

    export function health() {
      const checks = [
        '/api/health/orbit',
        '/api/health/planner',
        '/api/health/telemetry',
        '/api/health/receiver',
      ];
      const path = checks[Math.floor(Math.random() * checks.length)];
      const res  = http.get(`${BASE}${path}`, { tags: { endpoint: path.replace('/api/', '') } });
      check(res, { 'health 200': (r) => r.status === 200 });
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-k6-loadgen
  labels:
    {{- include "sattrack.labels" (dict "app" "k6-loadgen" "root" .) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k6-loadgen
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: k6-loadgen
        release: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/k6-loadgen.yaml") . | sha256sum }}
    spec:
      containers:
        - name: k6
          image: grafana/k6:latest
          command:
            - k6
            - run
            - /scripts/script.js
          env:
            - name: TARGET_URL
              value: "http://{{ .Release.Name }}-sattrack-ui:80"
            - name: RPS
              value: {{ .Values.k6.rps | quote }}
          volumeMounts:
            - name: script
              mountPath: /scripts/script.js
              subPath: script.js
          resources:
            requests: { cpu: 50m,  memory: 64Mi  }
            limits:   { cpu: 200m, memory: 128Mi }
      volumes:
        - name: script
          configMap:
            name: {{ .Release.Name }}-k6-script
