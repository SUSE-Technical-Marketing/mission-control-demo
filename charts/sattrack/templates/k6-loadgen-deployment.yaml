apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-k6-loadgen
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: k6-loadgen
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: k6-loadgen
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: k6-loadgen
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/k6-loadgen-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: k6
          image: grafana/k6:latest
          command:
            - k6
            - run
            - /scripts/script.js
          env:
            - name: TARGET_URL
              value: "http://{{ .Release.Name }}-tracker-api:{{ .Values.trackerApi.port }}"
            - name: RPS
              value: {{ .Values.k6.rps | quote }}
          volumeMounts:
            - name: script
              mountPath: /scripts/script.js
              subPath: script.js
          resources:
            requests:
              cpu:    50m
              memory: 64Mi
            limits:
              cpu:    200m
              memory: 128Mi
      volumes:
        - name: script
          configMap:
            name: {{ .Release.Name }}-k6-script
