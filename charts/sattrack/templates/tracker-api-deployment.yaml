apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-tracker-api
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: tracker-api
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: tracker-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: tracker-api
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/tracker-api-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: tracker-api
          image: node:20-alpine
          command: ["node", "/app/server.js"]
          ports:
            - containerPort: {{ .Values.trackerApi.port }}
          env:
            - name: PORT
              value: {{ .Values.trackerApi.port | quote }}
            - name: ORBIT_ENGINE_URL
              value: "http://{{ .Release.Name }}-orbit-engine:{{ .Values.orbitEngine.port }}"
            - name: PASS_PLANNER_URL
              value: "http://{{ .Release.Name }}-pass-planner:{{ .Values.passPlanner.port }}"
            - name: TELEMETRY_STORE_URL
              value: "http://{{ .Release.Name }}-telemetry-store:{{ .Values.telemetryStore.port }}"
            - name: SAT_RECEIVER_URL
              value: "http://{{ .Release.Name }}-sat-receiver:{{ .Values.satReceiver.port }}"
            - name: UPSTREAM_TIMEOUT_MS
              value: {{ .Values.trackerApi.upstreamTimeoutMs | quote }}
          volumeMounts:
            - name: code
              mountPath: /app/server.js
              subPath: server.js
          readinessProbe:
            httpGet: { path: /healthz, port: {{ .Values.trackerApi.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: {{ .Values.trackerApi.memoryRequest }}, cpu: 20m }
            limits:   { memory: {{ .Values.trackerApi.memoryLimit }},   cpu: 100m }
      volumes:
        - name: code
          configMap: { name: "{{ .Release.Name }}-tracker-api-code" }