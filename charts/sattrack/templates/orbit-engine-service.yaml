apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-orbit-engine
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: orbit-engine
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: orbit-engine
  ports:
    - port: {{ .Values.orbitEngine.port }}
      targetPort: {{ .Values.orbitEngine.port }}
      name: http
