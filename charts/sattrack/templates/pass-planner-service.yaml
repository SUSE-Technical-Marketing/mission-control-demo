apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-pass-planner
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: pass-planner
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: pass-planner
  ports:
    - port: {{ .Values.passPlanner.port }}
      targetPort: {{ .Values.passPlanner.port }}
      name: http