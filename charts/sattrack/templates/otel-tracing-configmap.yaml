apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-otel-tracing
  labels:
    {{- include "sattrack.labels" (dict "app" "otel-tracing" "root" .) | nindent 4 }}
data:
  tracing.js: |
    /**
     * tracing.js  —  OpenTelemetry SDK bootstrap
     *
     * Loaded via --require /app/tracing.js before server.js.
     * Auto-instruments Node.js http module so every inbound request and
     * every outbound http.get / http.request call produces a span.
     *
     * Required env vars (set via Helm values / Deployment env):
     *   OTEL_EXPORTER_OTLP_ENDPOINT  e.g. http://otel-collector:4318
     *   OTEL_SERVICE_NAME             e.g. tracker-api
     *
     * Optional (standard OTEL env vars honoured automatically):
     *   OTEL_RESOURCE_ATTRIBUTES      e.g. deployment.environment=lab
     */
    'use strict';

    const { NodeSDK }                        = require('@opentelemetry/sdk-node');
    const { OTLPTraceExporter }              = require('@opentelemetry/exporter-trace-otlp-http');
    const { HttpInstrumentation }            = require('@opentelemetry/instrumentation-http');
    const { Resource }                       = require('@opentelemetry/resources');
    const { SEMRESATTRS_SERVICE_NAME,
            SEMRESATTRS_SERVICE_VERSION }    = require('@opentelemetry/semantic-conventions');

    const serviceName = process.env.OTEL_SERVICE_NAME || 'sattrack-unknown';
    const endpoint    = process.env.OTEL_EXPORTER_OTLP_ENDPOINT;

    if (!endpoint) {
      console.log(JSON.stringify({
        ts: new Date().toISOString(), level: 'warn', svc: serviceName,
        msg: 'OTEL_EXPORTER_OTLP_ENDPOINT not set — tracing disabled',
      }));
      // Exit without initialising SDK — service runs normally, just untraced
      module.exports = {};
      return;
    }

    const sdk = new NodeSDK({
      resource: new Resource({
        [SEMRESATTRS_SERVICE_NAME]:    serviceName,
        [SEMRESATTRS_SERVICE_VERSION]: '1.0.0',
      }),
      traceExporter: new OTLPTraceExporter({
        url: `${endpoint}/v1/traces`,
      }),
      instrumentations: [
        new HttpInstrumentation({
          // Don't create spans for healthz polls — keeps traces clean
          ignoreIncomingRequestHook: (req) => req.url === '/healthz',
          ignoreOutgoingRequestHook: (req) => req.path === '/healthz',
        }),
      ],
    });

    sdk.start();

    console.log(JSON.stringify({
      ts: new Date().toISOString(), level: 'info', svc: serviceName,
      msg: 'OpenTelemetry tracing initialised',
      endpoint, serviceName,
    }));

    process.on('SIGTERM', () => sdk.shutdown());
    process.on('SIGINT',  () => sdk.shutdown());

    module.exports = { sdk };


  package.json: |
    {
      "name": "sattrack-tracing",
      "version": "1.0.0",
      "description": "OpenTelemetry bootstrap for sattrack services",
      "dependencies": {
        "@opentelemetry/sdk-node": "^0.52.0",
        "@opentelemetry/exporter-trace-otlp-http": "^0.52.0",
        "@opentelemetry/instrumentation-http": "^0.52.0",
        "@opentelemetry/resources": "^1.25.0",
        "@opentelemetry/semantic-conventions": "^1.25.0"
      }
    }
