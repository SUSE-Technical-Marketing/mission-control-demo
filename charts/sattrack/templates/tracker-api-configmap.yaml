apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-tracker-api-code
  labels:
    {{- include "sattrack.labels" (dict "app" "tracker-api" "root" .) | nindent 4 }}
data:
  server.js: |
    /**
     * tracker-api
     *
     * Single backend for the sattrack-ui dashboard.
     * Exposes both a composite /dashboard endpoint and individual per-service
     * endpoints so the UI (and k6) can call each upstream independently.
     * This gives SUSE Observability distinct edges and accurate per-service
     * error rates — when telemetry-store is down, GET /telemetry returns 500
     * and that error rate is visible without being buried in a composite call.
     *
     * Endpoints
     * ─────────
     *   GET /dashboard            fan-out to all upstreams, 200 or 207
     *   GET /positions            orbit-engine positions  (200 / 502)
     *   GET /schedule             pass-planner schedule   (200 / 502)
     *   GET /telemetry            telemetry-store quality (200 / 500)
     *   GET /receiver             sat-receiver status     (200 / 502)
     *   GET /health/orbit         orbit-engine healthz    (200 / 500)
     *   GET /health/planner       pass-planner healthz    (200 / 500)
     *   GET /health/telemetry     telemetry-store healthz (200 / 500)
     *   GET /health/receiver      sat-receiver healthz    (200 / 500)
     *   GET /healthz              self health
     */
    'use strict';

    const http = require('http');

    const ORBIT_ENGINE_URL    = process.env.ORBIT_ENGINE_URL    || 'http://localhost:3001';
    const PASS_PLANNER_URL    = process.env.PASS_PLANNER_URL    || 'http://localhost:3002';
    const TELEMETRY_STORE_URL = process.env.TELEMETRY_STORE_URL || 'http://localhost:3003';
    const SAT_RECEIVER_URL    = process.env.SAT_RECEIVER_URL    || 'http://localhost:3004';
    const TIMEOUT_MS          = parseInt(process.env.UPSTREAM_TIMEOUT_MS || '4000');

    // ── Structured logger ─────────────────────────────────────────────────────────
    function log(level, msg, fields = {}) {
      console.log(JSON.stringify({ ts: new Date().toISOString(), level, svc: 'tracker-api', msg, ...fields }));
    }

    // ── Upstream fetch ────────────────────────────────────────────────────────────
    function fetchJson(url) {
      return new Promise((resolve, reject) => {
        const t0    = Date.now();
        const timer = setTimeout(() => {
          log('warn', 'upstream timeout', { url, timeoutMs: TIMEOUT_MS });
          reject(new Error(`timeout after ${TIMEOUT_MS}ms: ${url}`));
        }, TIMEOUT_MS);

        const req = http.get(url, (res) => {
          clearTimeout(timer);
          let body = '';
          res.on('data', c => body += c);
          res.on('end', () => {
            const ms = Date.now() - t0;
            try {
              const data = JSON.parse(body);
              if (ms > 1000) log('warn', 'slow upstream', { url, ms, status: res.statusCode });
              resolve({ status: res.statusCode, data, ms });
            } catch (e) {
              log('error', 'upstream invalid JSON', { url, ms });
              reject(new Error(`invalid JSON from ${url}`));
            }
          });
        });
        req.on('error', e => {
          clearTimeout(timer);
          log('error', 'upstream connection error', { url, error: e.message });
          reject(e);
        });
      });
    }

    // Proxy a single upstream healthz — returns 200 if healthy, 500 if not
    async function proxyHealth(res, url, name) {
      try {
        const result = await fetchJson(url);
        const ok     = result.status === 200;
        res.writeHead(ok ? 200 : 500);
        res.end(JSON.stringify({ ok, service: name, upstream: result.data }));
      } catch (err) {
        log('error', `${name} health check failed`, { url, error: err.message });
        res.writeHead(500);
        res.end(JSON.stringify({ ok: false, service: name, error: err.message }));
      }
    }

    // ── HTTP server ───────────────────────────────────────────────────────────────
    const server = http.createServer(async (req, res) => {
      const t0 = Date.now();
      res.setHeader('Content-Type', 'application/json');
      res.setHeader('Access-Control-Allow-Origin', '*');

      const reply = (status, body) => {
        res.writeHead(status);
        res.end(JSON.stringify(body));
        if (!req.url.startsWith('/health') && req.url !== '/healthz') {
          log(status >= 500 ? 'error' : status === 207 ? 'warn' : 'info',
              'request', { method: req.method, path: req.url, status, ms: Date.now() - t0 });
        }
      };

      // ── Self health ─────────────────────────────────────────────────────────────
      if (req.url === '/healthz') {
        return reply(200, { ok: true, service: 'tracker-api' });
      }

      // ── Per-service health proxies ──────────────────────────────────────────────
      if (req.url === '/health/orbit')     return proxyHealth(res, `${ORBIT_ENGINE_URL}/healthz`,    'orbit-engine');
      if (req.url === '/health/planner')   return proxyHealth(res, `${PASS_PLANNER_URL}/healthz`,    'pass-planner');
      if (req.url === '/health/telemetry') return proxyHealth(res, `${TELEMETRY_STORE_URL}/healthz`, 'telemetry-store');
      if (req.url === '/health/receiver')  return proxyHealth(res, `${SAT_RECEIVER_URL}/healthz`,    'sat-receiver');

      // ── Individual data endpoints ───────────────────────────────────────────────

      if (req.url === '/positions') {
        try {
          const result = await fetchJson(`${ORBIT_ENGINE_URL}/positions`);
          return reply(200, result.data);
        } catch (err) {
          log('error', 'orbit-engine positions failed', { error: err.message });
          return reply(502, { error: err.message, service: 'orbit-engine' });
        }
      }

      if (req.url === '/schedule') {
        try {
          const result = await fetchJson(`${PASS_PLANNER_URL}/schedule`);
          return reply(200, result.data);
        } catch (err) {
          log('error', 'pass-planner schedule failed', { error: err.message });
          return reply(502, { error: err.message, service: 'pass-planner' });
        }
      }

      // Returns 500 (not 502) when the store is down — this is the error rate
      // signal we want to see spike in SUSE Observability during the exercise
      if (req.url === '/telemetry') {
        try {
          const result = await fetchJson(`${TELEMETRY_STORE_URL}/quality`);
          return reply(200, result.data);
        } catch (err) {
          log('error', 'telemetry-store quality failed', { error: err.message });
          return reply(500, { error: err.message, service: 'telemetry-store' });
        }
      }

      if (req.url === '/receiver') {
        try {
          const result = await fetchJson(`${SAT_RECEIVER_URL}/status`);
          return reply(200, result.data);
        } catch (err) {
          log('warn', 'sat-receiver status failed', { error: err.message });
          return reply(502, { error: err.message, service: 'sat-receiver' });
        }
      }

      // ── Composite dashboard ─────────────────────────────────────────────────────
      if (req.url === '/dashboard') {
        const errors  = {};
        const payload = {};

        const [orbitResult, scheduleResult, qualityResult, receiverResult] = await Promise.allSettled([
          fetchJson(`${ORBIT_ENGINE_URL}/positions`),
          fetchJson(`${PASS_PLANNER_URL}/schedule`),
          fetchJson(`${TELEMETRY_STORE_URL}/quality`),
          fetchJson(`${SAT_RECEIVER_URL}/status`),
        ]);

        if (orbitResult.status === 'fulfilled') {
          payload.positions = orbitResult.value.data.positions || [];
          payload.station   = orbitResult.value.data.station;
        } else {
          errors.orbit      = orbitResult.reason.message;
          payload.positions = [];
          log('error', 'orbit-engine failed', { error: orbitResult.reason.message });
        }

        if (scheduleResult.status === 'fulfilled') {
          payload.schedule = scheduleResult.value.data.schedule?.slice(0, 8) || [];
        } else {
          errors.schedule  = scheduleResult.reason.message;
          payload.schedule = [];
          log('error', 'pass-planner failed', { error: scheduleResult.reason.message });
        }

        if (qualityResult.status === 'fulfilled') {
          payload.telemetry = qualityResult.value.data;
        } else {
          errors.telemetry  = qualityResult.reason.message;
          payload.telemetry = null;
          log('error', 'telemetry-store failed', { error: qualityResult.reason.message });
        }

        if (receiverResult.status === 'fulfilled') {
          payload.receiver = receiverResult.value.data;
        } else {
          errors.receiver  = receiverResult.reason.message;
          payload.receiver = null;
          log('warn', 'sat-receiver unavailable', { error: receiverResult.reason.message });
        }

        const ms       = Date.now() - t0;
        const degraded = Object.keys(errors).length > 0;

        if (degraded) {
          log('warn', 'degraded dashboard response', { errors, ms });
        } else {
          log('info', 'dashboard ok', { ms, satellites: payload.positions?.length ?? 0 });
        }

        return reply(degraded ? 207 : 200, {
          ...payload,
          meta: { responseTimeMs: ms, degraded, errors: degraded ? errors : undefined, timestamp: new Date().toISOString() },
        });
      }

      return reply(404, { error: 'Not found' });
    });

    const PORT = process.env.PORT || 3005;
    server.listen(PORT, () => log('info', 'listening', {
      port: PORT,
      endpoints: ['/dashboard', '/positions', '/schedule', '/telemetry', '/receiver',
                  '/health/orbit', '/health/planner', '/health/telemetry', '/health/receiver'],
      upstreams: {
        orbitEngine:    ORBIT_ENGINE_URL,
        passPlanner:    PASS_PLANNER_URL,
        telemetryStore: TELEMETRY_STORE_URL,
        satReceiver:    SAT_RECEIVER_URL,
      },
    }));
