apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-telemetry-store
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: telemetry-store
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: telemetry-store
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: telemetry-store
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/telemetry-store-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: telemetry-store
          image: node:20-alpine
          command: ["node", "/app/server.js"]
          ports:
            - containerPort: {{ .Values.telemetryStore.port }}
          env:
            - name: PORT
              value: {{ .Values.telemetryStore.port | quote }}
            - name: CACHE_ENABLED
              value: {{ .Values.telemetryStore.cacheEnabled | quote }}
          volumeMounts:
            - name: code
              mountPath: /app/server.js
              subPath: server.js
          readinessProbe:
            httpGet: { path: /healthz, port: {{ .Values.telemetryStore.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: {{ .Values.telemetryStore.memoryRequest }}, cpu: 20m }
            limits:   { memory: {{ .Values.telemetryStore.memoryLimit }},   cpu: 200m }
      volumes:
        - name: code
          configMap: { name: "{{ .Release.Name }}-telemetry-store-code" }
