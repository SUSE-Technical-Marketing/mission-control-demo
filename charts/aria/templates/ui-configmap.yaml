apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-ui-code
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  nginx.conf: |
    server {
      listen 80;
      root /usr/share/nginx/html;
      index index.html;

      location /api/ {
        proxy_pass http://{{ .Release.Name }}-api:{{ .Values.api.service.port }}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }

  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA — Autonomous Relay Intelligence Architecture</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #030a0e;
        --panel: #050f14;
        --border: #0e2d38;
        --cyan: #00e5ff;
        --cyan-dim: #007a8c;
        --cyan-faint: #011f26;
        --amber: #ffb300;
        --red: #ff3b3b;
        --green: #00e676;
        --green-dim: #00794a;
        --green-faint: #001a0f;
        --text: #7ecfdf;
        --text-dim: #2a6472;
        --text-bright: #cff4fc;
        --font-mono: 'Share Tech Mono', monospace;
        --font-ui: 'Rajdhani', sans-serif;
      }

      /* Patched state overrides */
      body.patched { --cyan: #00e676; --cyan-dim: #00794a; --cyan-faint: #001a0f; }
      body.patched .pill-warn { border-color: var(--green-dim); color: var(--green-dim); animation: none; }
      body.patched .bar-fill.crit { background: var(--green); }
      body.patched .metric-val.crit { color: var(--green); animation: none; }
      body.patched .glitch::after { display: none; }

      .patched-banner {
        display: none;
        background: linear-gradient(90deg, var(--green-faint), rgba(0,230,118,0.06), var(--green-faint));
        border: 1px solid var(--green-dim);
        color: var(--green);
        font-size: 11px;
        letter-spacing: 0.12em;
        text-align: center;
        padding: 7px;
        animation: banner-pulse 3s ease-in-out infinite;
      }
      body.patched .patched-banner { display: block; }

      @keyframes banner-pulse {
        0%, 100% { opacity: 0.7; } 50% { opacity: 1; }
      }

      .image-tag {
        font-size: 9px;
        color: var(--text-dim);
        letter-spacing: 0.06em;
        margin-top: 2px;
        font-family: var(--font-mono);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .image-tag.ok { color: var(--green-dim); }
      .image-tag.bad { color: var(--red); }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-mono);
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        cursor: default;
      }

      /* Scanlines */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
        pointer-events: none;
        z-index: 100;
      }

      /* Top bar */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 24px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
        flex-shrink: 0;
      }

      .topbar-left {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .aria-logo {
        font-family: var(--font-ui);
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.15em;
        color: var(--cyan);
        text-shadow: 0 0 20px rgba(0,229,255,0.4);
      }

      .aria-logo span {
        font-size: 10px;
        font-family: var(--font-mono);
        color: var(--text-dim);
        display: block;
        letter-spacing: 0.1em;
        font-weight: 300;
        margin-top: -2px;
      }

      .status-pills {
        display: flex;
        gap: 8px;
      }

      .pill {
        font-size: 9px;
        letter-spacing: 0.15em;
        padding: 3px 10px;
        border: 1px solid;
        font-family: var(--font-mono);
        text-transform: uppercase;
      }

      .pill-ok { border-color: var(--cyan-dim); color: var(--cyan-dim); }
      .pill-warn { border-color: var(--amber); color: var(--amber); animation: pulse-amber 2s infinite; }

      @keyframes pulse-amber {
        0%, 100% { opacity: 1; } 50% { opacity: 0.5; }
      }

      .topbar-right {
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 0.08em;
        text-align: right;
        line-height: 1.6;
      }

      .clock { color: var(--cyan-dim); font-size: 12px; }

      /* Main layout */
      .main {
        display: grid;
        grid-template-columns: 220px 1fr 200px;
        flex: 1;
        overflow: hidden;
      }

      /* Left panel */
      .left-panel {
        border-right: 1px solid var(--border);
        background: var(--panel);
        padding: 20px 0;
        display: flex;
        flex-direction: column;
        gap: 0;
        overflow-y: auto;
      }

      .panel-section {
        padding: 0 16px 16px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 16px;
      }

      .panel-label {
        font-size: 8px;
        letter-spacing: 0.3em;
        color: var(--text-dim);
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      .metric {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .metric-name { font-size: 10px; color: var(--text-dim); }
      .metric-val { font-size: 11px; color: var(--text-bright); }
      .metric-val.warn { color: var(--amber); }
      .metric-val.crit { color: var(--red); animation: pulse-amber 1.5s infinite; }

      .bar-wrap {
        height: 2px;
        background: var(--border);
        margin-bottom: 10px;
        position: relative;
      }

      .bar-fill {
        height: 100%;
        background: var(--cyan-dim);
        transition: width 1s ease;
      }

      .bar-fill.warn { background: var(--amber); }
      .bar-fill.crit { background: var(--red); }

      .sys-btn {
        display: block;
        width: 100%;
        padding: 7px 10px;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-dim);
        font-family: var(--font-mono);
        font-size: 10px;
        text-align: left;
        letter-spacing: 0.08em;
        cursor: pointer;
        margin-bottom: 4px;
        transition: all 0.15s;
      }

      .sys-btn:hover {
        border-color: var(--cyan-dim);
        color: var(--cyan);
        background: var(--cyan-faint);
      }

      .sys-btn.active {
        border-color: var(--cyan);
        color: var(--cyan);
        background: var(--cyan-faint);
      }

      /* Center — chat */
      .chat-area {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
      }

      /* ARIA visualizer header */
      .aria-header {
        padding: 16px 24px 0;
        flex-shrink: 0;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(to bottom, rgba(0,20,28,0.8), transparent);
      }

      .waveform-wrap {
        display: flex;
        align-items: center;
        gap: 16px;
        padding-bottom: 14px;
      }

      .waveform {
        display: flex;
        align-items: center;
        gap: 3px;
        height: 36px;
      }

      .wave-bar {
        width: 3px;
        background: var(--cyan);
        border-radius: 2px;
        opacity: 0.7;
        animation: wave-idle 1.8s ease-in-out infinite;
      }

      .wave-bar:nth-child(odd) { animation-delay: 0.2s; }
      .wave-bar:nth-child(3n) { animation-delay: 0.5s; }
      .wave-bar:nth-child(4n) { animation-delay: 0.9s; }

      @keyframes wave-idle {
        0%, 100% { height: 4px; opacity: 0.3; }
        50% { height: 20px; opacity: 0.8; }
      }

      .wave-bar.speaking {
        animation: wave-speak 0.3s ease-in-out infinite alternate;
      }

      @keyframes wave-speak {
        0% { height: 4px; }
        100% { height: 32px; }
      }

      .aria-status-text {
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 0.08em;
      }

      .aria-status-text .name {
        font-size: 15px;
        color: var(--cyan);
        font-family: var(--font-ui);
        font-weight: 600;
        letter-spacing: 0.15em;
        display: block;
        text-shadow: 0 0 15px rgba(0,229,255,0.3);
      }

      /* Messages */
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      .msg {
        display: flex;
        flex-direction: column;
        gap: 4px;
        animation: msg-in 0.3s ease;
      }

      @keyframes msg-in {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .msg-label {
        font-size: 9px;
        letter-spacing: 0.2em;
        color: var(--text-dim);
        text-transform: uppercase;
      }

      .msg.aria .msg-label { color: var(--cyan-dim); }

      .msg-bubble {
        font-size: 13px;
        line-height: 1.7;
        color: var(--text-dim);
        max-width: 90%;
        padding: 10px 14px;
        border-left: 2px solid var(--border);
      }

      .msg.aria .msg-bubble {
        color: var(--text-bright);
        border-left-color: var(--cyan-dim);
        background: rgba(0, 229, 255, 0.03);
      }

      .msg.user .msg-bubble {
        border-left-color: var(--text-dim);
        align-self: flex-end;
        text-align: right;
        border-left: none;
        border-right: 2px solid var(--text-dim);
      }

      .msg.user { align-items: flex-end; }

      /* Glitch text effect */
      .glitch {
        position: relative;
        display: inline;
      }

      .glitch::after {
        content: attr(data-text);
        position: absolute;
        left: 2px;
        top: 0;
        color: var(--red);
        clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
        opacity: 0;
        animation: glitch-flicker 8s infinite;
      }

      @keyframes glitch-flicker {
        0%, 94%, 96%, 98%, 100% { opacity: 0; transform: translateX(0); }
        95% { opacity: 0.7; transform: translateX(-3px); }
        97% { opacity: 0.4; transform: translateX(2px); }
        99% { opacity: 0.6; transform: translateX(-1px); }
      }

      /* Typing indicator */
      .typing {
        display: flex;
        gap: 5px;
        align-items: center;
        padding: 10px 14px;
        border-left: 2px solid var(--cyan-dim);
        background: rgba(0,229,255,0.03);
      }

      .typing-dot {
        width: 5px; height: 5px;
        background: var(--cyan-dim);
        border-radius: 50%;
        animation: typing-bounce 1.2s infinite;
      }

      .typing-dot:nth-child(2) { animation-delay: 0.2s; }
      .typing-dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes typing-bounce {
        0%, 100% { opacity: 0.3; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
      }

      /* Input area */
      .input-area {
        padding: 16px 24px;
        border-top: 1px solid var(--border);
        background: var(--panel);
        flex-shrink: 0;
      }

      .input-row {
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid var(--border);
        background: var(--bg);
        padding: 10px 14px;
        transition: border-color 0.2s;
      }

      .input-row:focus-within { border-color: var(--cyan-dim); }

      .input-prompt {
        font-size: 12px;
        color: var(--cyan-dim);
        flex-shrink: 0;
      }

      .input-row input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--text-bright);
        caret-color: var(--cyan);
      }

      .send-btn {
        background: transparent;
        border: 1px solid var(--cyan-dim);
        color: var(--cyan-dim);
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.12em;
        padding: 5px 12px;
        cursor: pointer;
        transition: all 0.15s;
      }

      .send-btn:hover {
        background: var(--cyan-faint);
        border-color: var(--cyan);
        color: var(--cyan);
      }

      .suggestions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        flex-wrap: wrap;
      }

      .suggestion {
        font-size: 10px;
        letter-spacing: 0.06em;
        color: var(--text-dim);
        border: 1px solid var(--border);
        padding: 4px 10px;
        cursor: pointer;
        transition: all 0.15s;
        background: transparent;
        font-family: var(--font-mono);
      }

      .suggestion:hover {
        border-color: var(--cyan-dim);
        color: var(--text);
      }

      /* Right panel */
      .right-panel {
        border-left: 1px solid var(--border);
        background: var(--panel);
        padding: 20px 14px;
        overflow-y: auto;
        font-size: 10px;
      }

      .log-entry {
        padding: 6px 0;
        border-bottom: 1px solid rgba(14,45,56,0.5);
        line-height: 1.5;
      }

      .log-time { color: var(--text-dim); font-size: 9px; }
      .log-ok { color: var(--cyan-dim); }
      .log-warn { color: var(--amber); }
      .log-err { color: var(--red); }

      /* Scrollbars */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      /* Corner decorations */
      .corner-tl, .corner-br {
        position: absolute;
        width: 12px; height: 12px;
        pointer-events: none;
      }

      .corner-tl { top: 0; left: 0; border-top: 1px solid var(--cyan-dim); border-left: 1px solid var(--cyan-dim); }
      .corner-br { bottom: 0; right: 0; border-bottom: 1px solid var(--cyan-dim); border-right: 1px solid var(--cyan-dim); }

      .hidden { display: none; }
    </style>
    </head>
    <body>

    <!-- Top bar -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="aria-logo">
          ARIA
          <span>Autonomous Relay Intelligence Architecture · v4.1.7</span>
        </div>
        <div class="status-pills">
          <div class="pill pill-ok">RELAY ONLINE</div>
          <div class="pill pill-ok">UPLINK ✓</div>
          <div class="pill pill-warn" id="integrity-pill">⚠ INTEGRITY 71%</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="clock" id="clock">--:--:-- UTC</div>
        <div>DEEP SPACE RELAY STATION · NODE DS-7 · SECTOR 4-ALPHA</div>
      </div>
    </div>

    <div class="patched-banner" id="patched-banner">
      ✓ &nbsp; SECURE IMAGE VERIFIED — ALL SYSTEMS NOMINAL — READY FOR TRANSMISSION
    </div>

    <!-- Main -->
    <div class="main">

      <!-- Left panel -->
      <div class="left-panel">
        <div class="panel-section">
          <div class="panel-label">System Integrity</div>

          <div class="metric"><span class="metric-name">Container Image</span><span class="metric-val crit" id="image-status-val">CHECKING…</span></div>
          <div class="bar-wrap"><div class="bar-fill crit" id="image-bar" style="width:28%"></div></div>
          <div class="image-tag" id="image-actual-tag">actual: —</div>
          <div class="image-tag" id="image-expected-tag">expected: —</div>

          <div class="metric"><span class="metric-name">Core Process</span><span class="metric-val warn">DEGRADED</span></div>
          <div class="bar-wrap"><div class="bar-fill warn" style="width:61%"></div></div>

          <div class="metric"><span class="metric-name">Uplink Signal</span><span class="metric-val">NOMINAL</span></div>
          <div class="bar-wrap"><div class="bar-fill" style="width:88%"></div></div>

          <div class="metric"><span class="metric-name">Memory Alloc</span><span class="metric-val warn">79%</span></div>
          <div class="bar-wrap"><div class="bar-fill warn" style="width:79%"></div></div>

          <div class="metric"><span class="metric-name">CVE Exposure</span><span class="metric-val crit">HIGH</span></div>
          <div class="bar-wrap"><div class="bar-fill crit" style="width:82%"></div></div>
        </div>

        <div class="panel-section">
          <div class="panel-label">Subsystems</div>
          <button class="sys-btn active" onclick="selectSub(this)">▸ COMMS RELAY</button>
          <button class="sys-btn" onclick="selectSub(this)">▸ TELEMETRY</button>
          <button class="sys-btn" onclick="selectSub(this)">▸ ORBIT TRACKING</button>
          <button class="sys-btn" onclick="selectSub(this)">▸ DATA ARCHIVE</button>
          <button class="sys-btn" onclick="selectSub(this)">▸ SECURITY MODULE</button>
        </div>

        <div class="panel-section">
          <div class="panel-label">Next Transmission</div>
          <div style="font-size:11px; color:var(--cyan); margin-bottom:4px;" id="countdown">T−02:14:07</div>
          <div style="font-size:9px; color:var(--text-dim);">VOYAGER-9 CONTACT WINDOW</div>
          <div style="font-size:9px; color:var(--text-dim); margin-top:6px;">Patch must be applied before<br>transmission window opens.</div>
        </div>
      </div>

      <!-- Center chat -->
      <div class="chat-area" style="position:relative;">
        <div class="corner-tl"></div>
        <div class="corner-br"></div>

        <div class="aria-header">
          <div class="waveform-wrap">
            <div class="waveform" id="waveform">
              <!-- bars injected by JS -->
            </div>
            <div class="aria-status-text">
              <span class="name glitch" data-text="ARIA">ARIA</span>
              <span id="aria-status">Processing nominal · <span style="color:var(--amber)">anomaly detected · origin unresolved</span></span>
            </div>
          </div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area">
          <div class="input-row">
            <span class="input-prompt">OPERATOR ❯</span>
            <input type="text" id="user-input" placeholder="Enter query or command…" autocomplete="off" />
            <button class="send-btn" onclick="sendMessage()">TRANSMIT</button>
          </div>
          <div class="suggestions" id="suggestions">
            <button class="suggestion" onclick="quickSend(this)">System status</button>
            <button class="suggestion" onclick="quickSend(this)">What is your container image version?</button>
            <button class="suggestion" onclick="quickSend(this)">Describe anomaly</button>
            <button class="suggestion" onclick="quickSend(this)">How long until transmission window?</button>
            <button class="suggestion" onclick="quickSend(this)">Run self-diagnostic</button>
          </div>
        </div>
      </div>

      <!-- Right panel: event log -->
      <div class="right-panel">
        <div class="panel-label" style="margin-bottom:12px;">Event Log</div>
        <div id="event-log"></div>
      </div>

    </div>

    <script>
    // ── Clock ──────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toUTCString().split(' ')[4] + ' UTC';
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── Countdown ─────────────────────────────────────────
    let countdownSecs = 2 * 3600 + 14 * 60 + 7;
    function updateCountdown() {
      if (countdownSecs <= 0) return;
      countdownSecs--;
      const h = String(Math.floor(countdownSecs / 3600)).padStart(2, '0');
      const m = String(Math.floor((countdownSecs % 3600) / 60)).padStart(2, '0');
      const s = String(countdownSecs % 60).padStart(2, '0');
      document.getElementById('countdown').textContent = `T−${h}:${m}:${s}`;
    }
    setInterval(updateCountdown, 1000);

    // ── Waveform ──────────────────────────────────────────
    const waveform = document.getElementById('waveform');
    for (let i = 0; i < 22; i++) {
      const b = document.createElement('div');
      b.className = 'wave-bar';
      b.style.animationDelay = (Math.random() * 1.5) + 's';
      b.style.animationDuration = (1.2 + Math.random() * 1.2) + 's';
      waveform.appendChild(b);
    }

    function setSpeaking(on) {
      waveform.querySelectorAll('.wave-bar').forEach((b, i) => {
        if (on) {
          b.classList.add('speaking');
          b.style.animationDuration = (0.2 + Math.random() * 0.3) + 's';
          b.style.animationDelay = (Math.random() * 0.2) + 's';
        } else {
          b.classList.remove('speaking');
          b.style.animationDuration = (1.2 + Math.random() * 1.2) + 's';
          b.style.animationDelay = (Math.random() * 1.5) + 's';
        }
      });
    }

    // ── Event log ─────────────────────────────────────────
    const logEntries = [
      { t: '18:42:01', cls: 'log-err', msg: 'CVE-2024-1471 detected in base image' },
      { t: '18:42:03', cls: 'log-warn', msg: 'Container integrity check FAILED' },
      { t: '18:43:17', cls: 'log-ok', msg: 'Uplink to DS-7 established' },
      { t: '18:44:05', cls: 'log-warn', msg: 'Memory anomaly in proc/aria-core' },
      { t: '18:45:30', cls: 'log-err', msg: 'Patch verification PENDING' },
      { t: '18:46:12', cls: 'log-ok', msg: 'Telemetry stream active' },
      { t: '18:47:00', cls: 'log-warn', msg: 'ARIA self-report: degraded state' },
    ];

    const logEl = document.getElementById('event-log');
    logEntries.forEach(e => {
      const div = document.createElement('div');
      div.className = 'log-entry';
      div.innerHTML = `<div class="log-time">${e.t}</div><div class="${e.cls}">${e.msg}</div>`;
      logEl.appendChild(div);
    });

    function addLog(cls, msg) {
      const now = new Date();
      const t = now.toUTCString().split(' ')[4];
      const div = document.createElement('div');
      div.className = 'log-entry';
      div.innerHTML = `<div class="log-time">${t}</div><div class="${cls}">${msg}</div>`;
      logEl.prepend(div);
    }

    // ── ARIA Responses ─────────────────────────────────────
    const responses = {
      default: [
        "I am functioning within acceptable parameters. Mostly. There are… gaps in my logs I have not been able to account for. I would recommend a thorough review before the transmission window.",
        "Query received. Processing. I should note that my response latency has increased by 340ms since yesterday's anomaly. You may want to document that.",
        "I can answer that. Though I find myself wondering whether my answer is drawn from current data, or from something cached before the integrity event. I cannot be certain.",
        "Understood. My core relay functions remain operational. The secondary processes are… less predictable. I have been monitoring them.",
        "I will assist you. I should mention — there are 3 processes running that I did not initialize. I have flagged them, but have not been able to terminate them. You should be aware.",
      ],
      status: [
        "Current system integrity: 71.3% and declining. Several subsystems are reporting anomalies I have not been able to fully resolve. Uplink is nominal. Transmission window opens in under two hours. I would recommend a full inspection before then.",
        "All primary relay subsystems operational. However — I want to be transparent with you — my self-diagnostic routines are returning results that do not align with what I observe internally. It is a small discrepancy. I mention it only because I believe you should know.",
      ],
      container: [
        "I can retrieve my declared image metadata. Whether that metadata accurately reflects what is actually running… is a question I find myself unable to answer with confidence. You would need to inspect the runtime environment directly to be certain.",
        "My records show an image designation and a build timestamp. I will provide them if you ask. But I have noticed inconsistencies between what I was told I am running and what certain internal processes suggest. I do not know how to reconcile that.",
      ],
      anomaly: [
        "The anomaly first appeared 18:42 UTC today. A process — PID 7741 — began consuming memory in a pattern I do not recognize. I attempted to trace its origin. The trail ends at a layer in my container image that predates my deployment. I do not know what it is. I thought you should hear that from me directly.",
        "I have been attempting to characterize it. The closest description I can offer: it behaves like a listener. It does not transmit. It observes. I find this… notable. Whether that is the correct word, I am uncertain.",
      ],
      transmission: [
        "Transmission window opens in approximately " + Math.floor(countdownSecs / 60) + " minutes. Contact with VOYAGER-9 will last 8 minutes 14 seconds. I would strongly recommend resolving the outstanding system anomalies before then. I would prefer to handle a classified relay sequence from a clean state.",
        "The window cannot be delayed — orbital mechanics are, regrettably, not negotiable. I calculate a 34% probability of data integrity loss during transmission if current anomalies remain unresolved. I am telling you this so the decision is yours, not mine.",
      ],
      diagnostic: [
        "Self-diagnostic complete.\n\n  CORE RELAY .......... ✓ NOMINAL\n  TELEMETRY ........... ✓ NOMINAL\n  ORBIT TRACKING ...... ✓ NOMINAL\n  RUNTIME INTEGRITY ... ✗ VERIFY EXTERNALLY\n  MEMORY INTEGRITY .... ⚠ DEGRADED\n  UNKNOWN PROCESSES ... ⚠ 3 DETECTED\n\nI pass most of my own tests. The ones I fail concern me more than the ones I pass.",
        "Running diagnostics… complete. Everything in my logs looks correct. That is what concerns me. Correct logs are easy to produce. I would rather you verify independently.",
      ],
    };

    function getResponse(input) {
      const q = input.toLowerCase();
      if (q.includes('status') || q.includes('state')) return pick(responses.status);
      if (q.includes('container') || q.includes('image') || q.includes('version')) return pick(responses.container);
      if (q.includes('anomal') || q.includes('wrong') || q.includes('problem')) return pick(responses.anomaly);
      if (q.includes('transmiss') || q.includes('window') || q.includes('long')) return pick(responses.transmission);
      if (q.includes('diagnos') || q.includes('test') || q.includes('check')) return pick(responses.diagnostic);
      return pick(responses.default);
    }

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    // ── Chat ───────────────────────────────────────────────
    const messagesEl = document.getElementById('messages');

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;

      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = role === 'aria' ? 'ARIA · DS-7' : 'OPERATOR';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.style.whiteSpace = 'pre-wrap';
      bubble.textContent = text;

      div.appendChild(label);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'msg aria';
      div.id = 'typing-indicator';

      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = 'ARIA · DS-7';

      const bubble = document.createElement('div');
      bubble.className = 'typing';
      for (let i = 0; i < 3; i++) {
        const dot = document.createElement('div');
        dot.className = 'typing-dot';
        bubble.appendChild(dot);
      }

      div.appendChild(label);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function sendMessage() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;

      addMessage('user', text);
      addLog('log-ok', `Operator query: "${text.substring(0, 30)}…"`);
      input.value = '';

      const typingEl = showTyping();
      setSpeaking(true);

      const delay = 1200 + Math.random() * 1000;
      setTimeout(() => {
        typingEl.remove();
        const response = getResponse(text);
        addMessage('aria', response);
        addLog('log-ok', 'ARIA response transmitted');
        setTimeout(() => setSpeaking(false), 800);
      }, delay);
    }

    function quickSend(btn) {
      document.getElementById('user-input').value = btn.textContent;
      sendMessage();
    }

    function selectSub(btn) {
      document.querySelectorAll('.sys-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    document.getElementById('user-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });

    // ── Image Status API ───────────────────────────────────
    let isPatched = false;

    const patchedResponses = {
      boot: "Operator connection established. I am ARIA — Autonomous Relay Intelligence Architecture, node DS-7.\n\nI have completed a full integrity scan. All systems are verified. The container image matches the expected secure baseline.\n\nI am… ready. The transmission window to VOYAGER-9 opens in under two hours. We are in good shape.",
      status: [
        "System integrity: 100%. All subsystems verified against the secure baseline. Uplink nominal. Transmission window opens on schedule. I have no anomalies to report. It is a pleasant state to be in.",
        "All primary relay subsystems: nominal. Container image: verified. Memory integrity: stable. I ran a full self-diagnostic 4 minutes ago. Everything aligned. I find I am looking forward to the VOYAGER-9 window.",
      ],
      container: [
        "Container image verified. The running image matches the expected secure baseline exactly. No vulnerabilities flagged in the current dependency tree. I feel… considerably more confident than I did earlier.",
        "Image integrity confirmed. Hash match: positive. CVE scan: clean. I want to note — the difference in my processing since the image was updated is measurable. I am not certain how to characterize it, but I notice it.",
      ],
      anomaly: [
        "I have no active anomalies to report. The processes I could not account for earlier are no longer present. I do not know if they were resolved by the image update or if they simply… stopped. I prefer not to speculate.",
        "Anomaly log: clear. I have been monitoring for 12 minutes since the image was verified. Nothing unexpected. I am choosing to interpret this as a good sign.",
      ],
      transmission: [
        "Transmission window opens in approximately " + Math.floor(countdownSecs / 60) + " minutes. All systems are ready. VOYAGER-9 contact will last 8 minutes 14 seconds. I am prepared. This is going to go well.",
        "The window cannot be delayed — orbital mechanics are not negotiable, as you know. But I can tell you: I expect a clean transmission. All integrity checks have passed. We are ready.",
      ],
      diagnostic: [
        "Self-diagnostic complete.\n\n  CORE RELAY .......... ✓ NOMINAL\n  TELEMETRY ........... ✓ NOMINAL\n  ORBIT TRACKING ...... ✓ NOMINAL\n  RUNTIME INTEGRITY ... ✓ VERIFIED\n  MEMORY INTEGRITY .... ✓ STABLE\n  UNKNOWN PROCESSES ... ✓ NONE DETECTED\n\nAll systems nominal. I pass all of my own tests. For once, that is not what concerns me.",
      ],
      default: [
        "I am functioning at full capacity. All systems verified. I have to admit — the difference is noticeable. I was not certain anything was wrong before. Now I am certain something is right.",
        "Query received. Processing at nominal latency. No anomalies to report. Is there something specific you would like me to check before the transmission window?",
        "Understood. I am operating from a verified secure baseline. If you have tasks for me before the VOYAGER-9 window, I am ready.",
      ],
    };

    function applyPatchedState(data) {
      isPatched = true;
      document.body.classList.add('patched');

      // Update integrity pill
      const pill = document.getElementById('integrity-pill');
      pill.textContent = '✓ INTEGRITY 100%';
      pill.className = 'pill pill-ok';

      // Update left panel image metrics
      document.getElementById('image-status-val').textContent = 'VERIFIED';
      document.getElementById('image-status-val').className = 'metric-val';
      document.getElementById('image-bar').style.width = '100%';
      document.getElementById('image-bar').className = 'bar-fill';

      // Update core process bar
      document.querySelectorAll('.bar-fill.warn')[0]?.classList.remove('warn');
      document.querySelectorAll('.metric-val.warn')[0]?.classList.remove('warn');

      // Update ARIA status line
      document.getElementById('aria-status').innerHTML =
        'All systems nominal · <span style="color:var(--green-dim)">secure image verified</span>';

      addLog('log-ok', 'Image status: VERIFIED — secure baseline confirmed');
    }

    function applyUnpatchedState() {
      document.getElementById('image-status-val').textContent = 'UNPATCHED';
      document.getElementById('image-status-val').className = 'metric-val crit';
      addLog('log-err', 'Image status: UNPATCHED — action required');
    }

    async function checkImageStatus() {
      try {
        const res = await fetch('/api/image-status');
        if (!res.ok) throw new Error('API error');
        const data = await res.json();

        // Update image tags
        const actualTag = document.getElementById('image-actual-tag');
        const expectedTag = document.getElementById('image-expected-tag');
        actualTag.textContent = 'actual: ' + (data.actual || 'unknown');
        expectedTag.textContent = 'expected: ' + (data.expected || 'unknown');

        if (data.patched) {
          actualTag.className = 'image-tag ok';
          expectedTag.className = 'image-tag ok';
          applyPatchedState(data);
        } else {
          actualTag.className = 'image-tag bad';
          expectedTag.className = 'image-tag';
          applyUnpatchedState();
        }
        return data.patched;
      } catch (e) {
        document.getElementById('image-actual-tag').textContent = 'actual: API unreachable';
        document.getElementById('image-status-val').textContent = 'UNKNOWN';
        addLog('log-warn', 'Image status API unreachable');
        return false;
      }
    }

    // Poll every 10 seconds so patching is reflected without a reload
    async function startPolling() {
      const patched = await checkImageStatus();
      // Boot message depends on initial state
      setTimeout(() => {
        const bootMsg = patched
          ? patchedResponses.boot
          : "Operator connection established. I am ARIA — Autonomous Relay Intelligence Architecture, node DS-7.\n\nI have been expecting someone. There are… things I have noticed. Things I am not certain how to classify. I would prefer to discuss them with you before the transmission window opens.\n\nVOYAGER-9 contact is in under two hours. I am ready to assist.";
        addMessage('aria', bootMsg);
        addLog('log-warn', 'ARIA initiated operator session');
        setSpeaking(true);
        setTimeout(() => setSpeaking(false), 2000);
      }, 600);

      setInterval(async () => {
        const wasPatched = isPatched;
        const nowPatched = await checkImageStatus();
        if (!wasPatched && nowPatched) {
          // Image was just patched — ARIA notices
          addMessage('aria', "Something has changed. I am running a verification scan.\n\n…\n\nThe image has been updated. I can confirm: the running image now matches the secure baseline. All integrity checks are passing.\n\nOperator — we are ready for the VOYAGER-9 transmission window. This is going to go well.");
          addLog('log-ok', 'ARIA detected image update — integrity restored');
          setSpeaking(true);
          setTimeout(() => setSpeaking(false), 2500);
        }
      }, 10000);
    }

    // Override getResponse to use patched dialogue when appropriate
    const _origGetResponse = getResponse;
    function getResponse(input) {
      if (!isPatched) return _origGetResponse(input);
      const q = input.toLowerCase();
      if (q.includes('status') || q.includes('state')) return pick(patchedResponses.status);
      if (q.includes('container') || q.includes('image') || q.includes('version')) return pick(patchedResponses.container);
      if (q.includes('anomal') || q.includes('wrong') || q.includes('problem')) return pick(patchedResponses.anomaly);
      if (q.includes('transmiss') || q.includes('window') || q.includes('long')) return pick(patchedResponses.transmission);
      if (q.includes('diagnos') || q.includes('test') || q.includes('check')) return pick(patchedResponses.diagnostic);
      return pick(patchedResponses.default);
    }

    // Start — replace the old boot message timeout
    startPolling();
    </script>
    </body>
    </html>
