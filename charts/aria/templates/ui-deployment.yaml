apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ui
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: ui
        app.kubernetes.io/part-of: {{ .Chart.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/ui-configmap.yaml") . | sha256sum }}
    spec:
      {{- if or (.Values.global.imagePullSecrets) (and (not (empty .Values.appco)) (not (empty .Values.appco.pullSecret))) }}
      imagePullSecrets:
      {{- with .Values.global.imagePullSecrets }}
      {{- range $ps := . }}
      - name: {{ $ps }}
      {{- end }}
      {{- end }}
      {{- if and (not (empty .Values.appco)) (not (empty .Values.appco.pullSecret)) }}
      - name: {{ .Values.appco.pullSecret }}
      {{- end }}
      {{- end }}
      containers:
        - name: {{ .Release.Name }}-ui
          image: {{ .Values.ui.image }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: ui-code
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: ui-code
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}

      volumes:
        - name: ui-code
          configMap:
            name: {{ .Release.Name }}-ui-code
