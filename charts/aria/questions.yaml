questions:
  - question: "What is the host name for the ARIA ingress?"
    type: "string"
    label: "ARIA Ingress Host"
    variable: "ingress.host"
    default: "aria.example.com"
    help: "The host name used to access ARIA via the ingress."
  - question: "Nginx Image"
    type: "string"
    label: "Nginx Image"
    variable: "ui.image"
    default: "nginx:latest"
    help: "The Docker image for the Nginx server."
  - question: "NodeJS Image"
    type: "string"
    label: "NodeJS Image"
    variable: "api.image"
    default: "node:latest"
    help: "The Docker image for the NodeJS API server."
  - question: "Image Pull Secret"
    type: "string"
    label: "Image Pull Secret"
    variable: "appco.pullSecret"
    default: ""
    help: "A (pre-existing) image pull secret for accessing private Docker registries."
