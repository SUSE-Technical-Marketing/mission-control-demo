questions:
  - question: "What is the host name for the Satellite Uplink ingress?"
    type: "string"
    label: "Satellite Uplink Ingress Host"
    variable: "ingress.host"
    default: "satellite-uplink.local"
    help: "The host name used to access the Satellite Uplink via the ingress."
  - question: "Ingress Class name"
    type: "string"
    label: "Ingress Class Name"
    variable: "ingress.className"
    default: "traefik"
    help: "The ingress class name."
  - question: "Nginx Image Registry"
    type: "string"
    label: "Nginx Image Registry"
    variable: "nginx.image.registry"
    default: ""
    help: "The Docker registry for the Nginx server image."
  - question: "Nginx Image"
    type: "string"
    label: "Nginx Image"
    variable: "nginx.image.repository"
    default: "library/nginx"
    help: "The Docker image for the Nginx server."
  - question: "Nginx Image Tag"
    type: "string"
    label: "Nginx Image Tag"
    variable: "nginx.image.tag"
    default: "latest"
    help: "The Docker image tag for the Nginx server."
  - question: "Image Pull Secret"
    type: "string"
    label: "Image Pull Secret"
    variable: "appco.pullSecret"
    default: ""
    help: "A (pre-existing) image pull secret for accessing private Docker registries."
  - question: "TLS Secret Name"
    type: "string"
    label: "TLS Secret Name"
    variable: "ingress.tls.secretName"
    default: "wildcard-tls"
    help: "The name of the TLS secret for the ingress."